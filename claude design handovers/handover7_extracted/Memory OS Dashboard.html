<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=1440" />
<title>Memory OS — Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    /* Deep navy palette anchored on #010619 */
    --bg:           #010619;
    --bg-sidebar:   #02081f;
    --panel:        #0a1230;
    --panel-2:      #121b3d;
    --panel-pop:    #0e1736;
    --border:       #1c2750;
    --border-strong:#2a3768;
    --border-subtle:#131c40;

    --text:         #e7ecff;
    --text-dim:     #94a0c9;
    --text-very-dim:#5f6a96;

    --accent:       oklch(0.80 0.13 80);   /* amber */
    --active:       #e9b452;               /* active-document accent (used wherever a nav row is current) */
    --success:      oklch(0.74 0.14 165);
    --info:         oklch(0.72 0.13 240);
    --danger:       oklch(0.70 0.18 22);

    --font:         "Geist", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    --font-display: "Geist", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    --font-mono:    "Geist", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  * { box-sizing: border-box; }
  html, body, #root { height: 100%; }
  body {
    margin: 0;
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    font-feature-settings: "ss01", "cv11", "tnum";
    font-variant-numeric: tabular-nums;
    font-size: 14px;
    line-height: 1.4;
  }
  button { font-family: inherit; }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 5px; border: 2px solid var(--bg); }
  ::-webkit-scrollbar-thumb:hover { background: var(--border-strong); }
  /* selection */
  ::selection { background: oklch(0.80 0.13 80 / 0.3); }

  input::placeholder, textarea::placeholder {
    color: var(--text-very-dim);
    opacity: 1;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50%      { opacity: 0.55; transform: scale(0.85); }
  }
  @keyframes sparkleSpin {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }
  @keyframes modalFadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
  @keyframes modalPopIn {
    from { opacity: 0; transform: translateY(8px) scale(0.98); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="sidebar.jsx"></script>
<script type="text/babel" src="dashboard-top.jsx"></script>
<script type="text/babel" src="closeness-score.jsx"></script>
<script type="text/babel" src="dashboard-sections.jsx"></script>
<script type="text/babel" src="note-view.jsx"></script>
<script type="text/babel" src="people-view.jsx"></script>
<script type="text/babel" src="idea-view.jsx"></script>
<script type="text/babel" src="tasks-view.jsx"></script>
<script type="text/babel" src="plans-view.jsx"></script>
<script type="text/babel" src="settings-view.jsx"></script>
<script type="text/babel" src="confirm-dialog.jsx"></script>
<script type="text/babel" src="app.jsx"></script>
</body>
</html>
