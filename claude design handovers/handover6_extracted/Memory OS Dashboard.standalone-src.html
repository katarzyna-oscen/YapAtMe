<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=1440" />
<title>Memory OS — Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    /* Deep navy palette anchored on #010619 */
    --bg:           #010619;
    --bg-sidebar:   #02081f;
    --panel:        #0a1230;
    --panel-2:      #121b3d;
    --panel-pop:    #0e1736;
    --border:       #1c2750;
    --border-strong:#2a3768;
    --border-subtle:#131c40;

    --text:         #e7ecff;
    --text-dim:     #94a0c9;
    --text-very-dim:#5f6a96;

    --accent:       oklch(0.80 0.13 80);   /* amber */
    --success:      oklch(0.74 0.14 165);
    --info:         oklch(0.72 0.13 240);
    --danger:       oklch(0.70 0.18 22);

    --font:         "Geist", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    --font-display: "Geist", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    --font-mono:    "Geist", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  * { box-sizing: border-box; }
  html, body, #root { height: 100%; }
  body {
    margin: 0;
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    font-feature-settings: "ss01", "cv11", "tnum";
    font-variant-numeric: tabular-nums;
    font-size: 14px;
    line-height: 1.4;
  }
  button { font-family: inherit; }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 5px; border: 2px solid var(--bg); }
  ::-webkit-scrollbar-thumb:hover { background: var(--border-strong); }
  /* selection */
  ::selection { background: oklch(0.80 0.13 80 / 0.3); }

  input::placeholder, textarea::placeholder {
    color: var(--text-very-dim);
    opacity: 1;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50%      { opacity: 0.55; transform: scale(0.85); }
  }
  @keyframes sparkleSpin {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }
</style>
</head>
