<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="75%">
      <stop offset="0" stop-color="#141d44"/>
      <stop offset="60%" stop-color="#0a1130"/>
      <stop offset="100%" stop-color="#050a20"/>
    </radialGradient>
    <linearGradient id="rod" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f0c64e"/>
      <stop offset="50%" stop-color="#d9a236"/>
      <stop offset="100%" stop-color="#b9831f"/>
    </linearGradient>
    <radialGradient id="node" cx="38%" cy="32%" r="72%">
      <stop offset="0" stop-color="#ffe9a8"/>
      <stop offset="35%" stop-color="#f3c44f"/>
      <stop offset="75%" stop-color="#d39a2c"/>
      <stop offset="100%" stop-color="#9c6e16"/>
    </radialGradient>
  </defs>
  <rect x="16" y="16" width="480" height="480" rx="112" fill="url(#bg)"/>
  <rect x="16.5" y="16.5" width="479" height="479" rx="111.5" fill="none" stroke="#2a3766" stroke-width="3"/>
  <!-- Tetrahedron edges -->
  <g stroke="url(#rod)" stroke-width="20" stroke-linecap="round" fill="none">
    <line x1="256" y1="150" x2="150" y2="372"/>
    <line x1="256" y1="150" x2="362" y2="372"/>
    <line x1="150" y1="372" x2="362" y2="372"/>
    <line x1="256" y1="150" x2="256" y2="300"/>
    <line x1="150" y1="372" x2="256" y2="300"/>
    <line x1="362" y1="372" x2="256" y2="300"/>
  </g>
  <!-- Vertices: near-center (small), apex, bottom-left, bottom-right -->
  <g>
    <circle cx="256" cy="300" r="24" fill="url(#node)"/>
    <circle cx="256" cy="150" r="44" fill="url(#node)"/>
    <circle cx="150" cy="372" r="44" fill="url(#node)"/>
    <circle cx="362" cy="372" r="44" fill="url(#node)"/>
  </g>
</svg>
